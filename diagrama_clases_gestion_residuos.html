
<div id="erd"></div>
<style>
#erd { padding: 8px 0; }
#erd svg { max-width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f4f2ec',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  Areas {
    int id_area PK
    varchar nombre
  }
  Responsables {
    int id_responsable PK
    varchar nombre
    varchar cargo
  }
  TiposResiduo {
    int id_tipo PK
    varchar nombre
    bit peligroso
  }
  ClasificacionResiduo {
    int id_clasificacion PK
    varchar descripcion
  }
  EstadosResiduo {
    int id_estado PK
    varchar estado
  }
  DisposicionFinal {
    int id_disposicion PK
    varchar tipo
  }
  EmpresasGestoras {
    int id_empresa PK
    varchar nombre
    varchar telefono
  }
  Transporte {
    int id_transporte PK
    varchar tipo_vehiculo
    varchar placa
    int id_empresa FK
  }
  Residuos {
    int id_residuo PK
    int id_area FK
    int id_tipo FK
    int id_clasificacion FK
    int id_estado FK
    int id_responsable FK
    decimal cantidad
    date fecha
  }
  HistorialDisposicion {
    int id_historial PK
    int id_residuo FK
    int id_disposicion FK
    int id_transporte FK
    date fecha
  }
  Normativas {
    int id_normativa PK
    varchar nombre
    varchar descripcion
  }
  Cumplimiento {
    int id_cumplimiento PK
    int id_residuo FK
    int id_normativa FK
    bit cumple
    date fecha_revision
  }
  Auditoria {
    int id_auditoria PK
    varchar tabla
    varchar accion
    varchar usuario
    datetime fecha
  }

  Areas ||--o{ Residuos : "tiene"
  TiposResiduo ||--o{ Residuos : "clasifica"
  ClasificacionResiduo ||--o{ Residuos : "asigna"
  EstadosResiduo ||--o{ Residuos : "define"
  Responsables ||--o{ Residuos : "registra"
  Residuos ||--o{ HistorialDisposicion : "genera"
  DisposicionFinal ||--o{ HistorialDisposicion : "aplica"
  Transporte ||--o{ HistorialDisposicion : "transporta"
  EmpresasGestoras ||--o{ Transporte : "opera"
  Residuos ||--o{ Cumplimiento : "verifica"
  Normativas ||--o{ Cumplimiento : "rige"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
